services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: journey_dev
      POSTGRES_USER: journey
      POSTGRES_PASSWORD: journey
    ports:
      - "5432:5432"
    volumes:
      - journey_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U journey -d journey_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - journey_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  journey_postgres_data:
  journey_redis_data:
